<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Editar Tarefa</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style> body { background-color: #f4f6f8; } </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'listarTarefas' %}">
                <i class="bi bi-check2-square me-2"></i>Minhas Tarefas
            </a>
            <div class="d-flex text-white align-items-center gap-3">
                <span><i class="bi bi-person-circle me-1"></i>{{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-box-arrow-right me-1"></i>Sair
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 680px">
        <div class="mb-3">
            <a href="{% url 'detalharTarefa' tarefa.pk %}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0 fw-bold"><i class="bi bi-pencil me-2"></i>Editar Tarefa</h5>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'editarTarefa' tarefa.pk %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="titulo" class="form-label fw-semibold">Título</label>
                        <input type="text" name="titulo" id="titulo" class="form-control"
                               value="{{ tarefa.titulo }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label fw-semibold">Descrição</label>
                        <textarea name="descricao" id="descricao" class="form-control" rows="4"
                                  required>{{ tarefa.descricao }}</textarea>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="data" class="form-label fw-semibold">Data Limite</label>
                            <input type="date" name="data" id="data" class="form-control"
                                   value="{{ tarefa.data|date:'Y-m-d' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="prioridade" class="form-label fw-semibold">Prioridade</label>
                            <select name="prioridade" id="prioridade" class="form-select">
                                <option value="baixa"  {% if tarefa.prioridade == 'baixa'  %}selected{% endif %}>Baixa</option>
                                <option value="media"  {% if tarefa.prioridade == 'media'  %}selected{% endif %}>Média</option>
                                <option value="alta"   {% if tarefa.prioridade == 'alta'   %}selected{% endif %}>Alta</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" name="concluida" id="concluida"
                               {% if tarefa.concluida %}checked{% endif %}>
                        <label class="form-check-label" for="concluida">Marcar como concluída</label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save me-1"></i>Salvar Alterações
                        </button>
                        <a href="{% url 'detalharTarefa' tarefa.pk %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
